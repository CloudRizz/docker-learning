<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            padding: 48px 16px;
            color: #1e293b;
        }

        .container {
            max-width: 520px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 4px;
        }

        .subtitle {
            color: #64748b;
            font-size: 14px;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        #taskInput {
            flex: 1;
            padding: 14px 16px;
            font-size: 15px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            background: #fff;
            color: #1e293b;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        #taskInput:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        #taskInput::placeholder {
            color: #94a3b8;
        }

        .btn-add {
            padding: 14px 24px;
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            background: #3b82f6;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-add:hover {
            background: #2563eb;
        }

        .btn-add:active {
            transform: scale(0.97);
        }

        .task-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding: 0 4px;
        }

        .task-header h2 {
            font-size: 14px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .task-count {
            font-size: 13px;
            color: #94a3b8;
        }

        #taskList {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #taskList li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            transition: box-shadow 0.2s, border-color 0.2s;
        }

        #taskList li:hover {
            border-color: #cbd5e1;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .task-text {
            flex: 1;
            font-size: 15px;
            color: #334155;
            word-break: break-word;
        }

        .btn-delete {
            padding: 8px;
            font-size: 14px;
            color: #94a3b8;
            background: transparent;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: color 0.2s, background 0.2s;
            margin-left: 12px;
        }

        .btn-delete:hover {
            color: #ef4444;
            background: #fef2f2;
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            background: #fff;
            border: 2px dashed #e2e8f0;
            border-radius: 12px;
            color: #94a3b8;
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 15px;
        }

        .loading {
            text-align: center;
            padding: 48px;
            color: #64748b;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #e2e8f0;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Task Manager</h1>
        <p class="subtitle">Stay organized, get things done</p>
    </header>

    <div class="input-group">
        <input id="taskInput" placeholder="What needs to be done?" onkeypress="handleKeyPress(event)">
        <button class="btn-add" onclick="addTask()">Add</button>
    </div>

    <div class="task-header">
        <h2>Tasks</h2>
        <span class="task-count" id="taskCount"></span>
    </div>

    <ul id="taskList">
        <li class="loading">
            <div style="width: 100%;">
                <div class="spinner"></div>
                <p>Loading tasks...</p>
            </div>
        </li>
    </ul>
</div>

<script>
async function loadTasks() {
    const res = await fetch('/api/tasks');
    const tasks = await res.json();

    const list = document.getElementById('taskList');
    const countEl = document.getElementById('taskCount');
    
    list.innerHTML = '';
    countEl.textContent = tasks.length > 0 ? `${tasks.length} item${tasks.length !== 1 ? 's' : ''}` : '';

    if (tasks.length === 0) {
        list.innerHTML = `
            <li class="empty-state">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                </svg>
                <p>No tasks yet. Add one above!</p>
            </li>
        `;
        return;
    }

    tasks.forEach(t => {
        const li = document.createElement('li');
        li.innerHTML = `
            <span class="task-text">${escapeHtml(t.task)}</span>
            <button class="btn-delete" onclick="deleteTask('${t.id}')" title="Delete task">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
            </button>
        `;
        list.appendChild(li);
    });
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

async function addTask() {
    const input = document.getElementById('taskInput');
    const task = input.value.trim();
    
    if (!task) return;

    await fetch('/api/tasks', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({task})
    });

    input.value = '';
    loadTasks();
}

function handleKeyPress(event) {
    if (event.key === 'Enter') {
        addTask();
    }
}

async function deleteTask(id) {
    await fetch('/api/tasks/' + id, {
        method: 'DELETE'
    });

    loadTasks();
}

loadTasks();
</script>

</body>
</html>
